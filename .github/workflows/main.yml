name: Windows RDP - Bore
on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Download Bore
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/latest/download/bore.exe" -OutFile "bore.exe"
          
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user adminuser SecurePass123! /add
          net localgroup administrators adminuser /add
          
      - name: Start Bore Tunnel
        run: |
          .\bore.exe local 3389 --to bore.pub
