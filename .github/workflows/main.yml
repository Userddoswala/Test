name: Windows RDP - Cloudflare
on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Download Cloudflare
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
      
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Create User
        run: |
          net user adminuser SecurePass123! /add
          net localgroup administrators adminuser /add
          net localgroup "Remote Desktop Users" adminuser /add
          
      - name: Start TCP Tunnel for RDP
        run: |
          .\cloudflared.exe tunnel --url rdp://localhost:3389
