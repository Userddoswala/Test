name: Windows RDP - Cloudflare
on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Download Cloudflare
        run: |
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
      
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          
      - name: Create User
        run: |
          net user adminuser SecurePass123! /add
          net localgroup administrators adminuser /add
          net localgroup "Remote Desktop Users" adminuser /add
          
      - name: Start RDP Tunnel (TCP)
        run: |
          Write-Host "Starting TCP tunnel for RDP on port 3389..."
          .\cloudflared.exe tunnel --url tcp://localhost:3389 --protocol http2 --log-level debug
