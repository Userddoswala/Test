name: Windows RDP - Bore
on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Download Bore
        run: |
          curl -L -o bore.exe https://github.com/ekzhang/bore/releases/download/v0.5.0/bore.exe
          
      - name: Setup RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user adminuser SecurePass123! /add
          net localgroup administrators adminuser /add
          
      - name: Start Bore Tunnel
        run: |
          Write-Host "========================================="
          Write-Host "🔵 BORE TUNNEL STARTING"
          Write-Host "📡 Connect to: bore.pub:<PORT>"
          Write-Host "🔑 Username: adminuser"
          Write-Host "🔑 Password: SecurePass123!"
          Write-Host "========================================="
          .\bore.exe local 3389 --to bore.pub
