name: Windows RDP - LocalXpose
on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360  # GitHub ka limit 6 hours
    steps:
      - name: Download LocalXpose
        run: |
          Invoke-WebRequest -Uri "https://github.com/localxpose/loclx/releases/latest/download/loclx-windows-amd64.zip" -OutFile "loclx.zip"
          Expand-Archive loclx.zip -Force
          
      - name: Setup RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user adminuser SecurePass123! /add
          net localgroup administrators adminuser /add
          
      - name: Start Tunnel
        run: |
          .\loclx\loclx.exe tunnel tcp --port 3389
